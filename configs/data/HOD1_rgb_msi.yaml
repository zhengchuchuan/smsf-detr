# @package _global_

defaults:
  - /data/base_rgb_msi
  - _self_

data:
  dataset_file: coco_rgb_msi
  dataset_name: HOD1_rgb_msi
  dataset_dir: data/HOD-1
  # 类别（COCO/VOC 标注里不需要显式提供 background 类别；训练时 background/no-object 由模型内部处理）
  # HOD3K COCO 标注包含 3 个前景类别：people/bike/car（category_id=1/2/3）。
  class_names: ["Toyblock_screen", "Photo_screen", "Pen_screen","Photo_real","Toyblock_real","Pen_real","Leaf_screen","Leaf_real"]
  ms_input_channels: 3
  channel_splits: [3, 3]
  ms_expected_channels: 3
  rgb_normalize_mode: imagenet
  ms_suffix: ".jpg"

  # MSI: fixed_scale does (ms / ms_fixed_scale) and clamps to [0,1].
  ms_normalize_mode: fixed_scale
  # 16-bit MSI TIF full scale.
  ms_fixed_scale: 255.0
  # YOLO-style：保持宽高比 + padding 到方形（同步作用于 RGB + MSI + bbox）
  shared_transform: letterbox
  letterbox_fill_value: 114
  letterbox_ms_fill_value: 0.0
