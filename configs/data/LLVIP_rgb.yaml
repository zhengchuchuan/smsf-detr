# @package _global_

defaults:
  - /data/base_rgb
  - _self_

data:
  dataset_name: LLVIP_rgb
  dataset_dir: data/LLVIP
  # 类别（含 background；用于 remap/评测映射/可视化）
  # 注：COCO/VOC 标注里不需要显式提供 background 类别；训练时 background/no-object 由模型内部处理。
  # LLVIP COCO 标注仅包含 1 个前景类别：person（category_id=1）。
  class_names: ["person"]
