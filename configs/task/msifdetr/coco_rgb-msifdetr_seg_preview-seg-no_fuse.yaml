# @package _global_
# 基于 `configs/task/msifdetr/coco_rgb_msifdetr_small_det_no_fuse_20251218-bset.yaml`：
# - 将模型切换为 `configs/model/msifdetr/msifdetr_seg_preview.yaml`（开启 segmentation_head）
# - 其余数据/训练策略尽量保持一致，便于对照

defaults:
  - /data/oil_rgb_20260101
  - /model/msifdetr/msifdetr_seg_preview
  - /runtime/default
  - /train/msifdetr_default
  - /task/msifdetr/base
  - _self_

model:
  # seg_preview 与本仓库 DinoV2 配置通常不完全对齐，保持与 bset 一致：不额外加载 DinoV2 权重
  load_dinov2_weights: false

train:
  # 关键：数据集需要返回 masks（datasets.build_dataset 会读取 args.segmentation_head）
  segmentation_head: true

  epochs: 120
  # 对齐 best 的有效 batch=4
  batch_size: 2
  grad_accum_steps: 2

  lr: 5e-5
  lr_encoder: 5e-5
  lr_scheduler: cosine
  lr_min_factor: 0.1
  warmup_epochs: 1
  warmup_steps: 1000

