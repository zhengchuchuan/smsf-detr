# @package _global_
# 参考 `configs/task/msifdetr/coco_rgb-msifdetr_large-det-no_fuse-all_data.yaml`：
# - 将模型从 msifdetr_large 切换为 msifdetr_medium（M 尺寸）
# - 其余数据/训练策略尽量保持一致，便于对照

defaults:
  - /data/oil_rgb_20260101_all_data
  - /model/msifdetr/msifdetr_medium
  - /runtime/default
  - /train/msifdetr_default
  - /task/msifdetr/base
  - _self_

model:
  load_dinov2_weights: false

train:
  epochs: 40
  # 对齐 best 的有效 batch=4
  batch_size: 4
  grad_accum_steps: 2

  lr: 5e-5
  lr_encoder: 5e-5
  lr_scheduler: cosine
  lr_min_factor: 0.1
  warmup_epochs: 1
  warmup_steps: 1000

# oil_rgb_all_data 包含多个 dataset_dirs；其中如 oil_negative 可能没有 val/test 标注。
# 开启该选项后，将在构建 val/test 时自动跳过缺失 split 的数据集根目录。
data:
  skip_missing_splits: true

runtime:
  device_ids: [2]