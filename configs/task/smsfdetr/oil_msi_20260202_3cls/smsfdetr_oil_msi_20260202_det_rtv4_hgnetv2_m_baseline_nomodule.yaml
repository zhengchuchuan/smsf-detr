# @package _global_

# MSI-only baseline:
# - strict single-stream RT-DETRv4-M HGNetv2
# - no extra modules
defaults:
  - /data/oil_msi_20260202_3cls
  - /model/rtmsfdetr/rtv4_hgnetv2_m
  - /runtime/default
  - /train/rtmsfdetr_default
  - /task/smsfdetr/base
  - _self_

model:
  model_alias: smsfdetr_rtv4_hgnetv2_m_oil_msi20260202_baseline_nomodule
  disable_distill: true
  # Original single-stream HGNetv2 path: 7-channel MSI is fed directly into backbone.
  dual_stream_backbone: false

data:
  # Oil MSI uses only a small fraction of the 16-bit range; fixed_scale makes single-stream inputs too dark.
  ms_normalize_mode: per_channel_minmax

train:
  model_alias: smsfdetr_rtv4_hgnetv2_m_det_oil_msi20260202_baseline_nomodule
  batch_size: 24
  epochs: 100
  num_classes: 3
  lr: 0.0004
  weight_decay: 0.0001
  optimizer_param_groups:
    # MSI-only single-stream should not reuse the overly conservative 4e-5 backbone lr.
    - params: '^(?=.*backbone)(?!.*(?:norm|bn)).*$'
      lr: 0.0002
    - params: '^(?=.*(?:norm|bn)).*$'
      weight_decay: 0.0
  flat_epoch: 49
  no_aug_epoch: 12
