# @package _global_

# MSI-only ablation:
# - keep the original single-stream HGNetv2 stem as the main path
# - add a shallow explicit per-band residual MS branch with inner fixed-band CMDA
# - add a CF-style single-scale deformable interaction from the residual branch to the original stem feature
# - disable anchor detach while keeping StemCF memory detach enabled
defaults:
  - /task/smsfdetr/oil_msi_20260202_3cls/smsfdetr_oil_msi_20260202_det_rtv4_hgnetv2_m_origstem_residual_msbranch_shared_hgstem_inner_fixed_band_cmda_b3_stem_cf_interactive
  - _self_

model:
  model_alias: smsfdetr_rtv4_hgnetv2_m_oil_msi20260202_origstem_residual_msbranch_shared_hgstem_inner_fixed_band_cmda_b3_stem_cf_interactive_anchor_detach_false_memory_detach_true
  backbone_ms_residual_stem:
    align:
      anchor_detach: false
    stem_interactive:
      memory_detach: true

train:
  model_alias: smsfdetr_rtv4_hgnetv2_m_det_oil_msi20260202_origstem_residual_msbranch_shared_hgstem_inner_fixed_band_cmda_b3_stem_cf_interactive_anchor_detach_false_memory_detach_true
