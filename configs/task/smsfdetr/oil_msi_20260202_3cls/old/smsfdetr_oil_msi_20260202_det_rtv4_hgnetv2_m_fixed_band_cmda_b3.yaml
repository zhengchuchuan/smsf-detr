# @package _global_

# MSI-only Fixed-Band CMDA ablation:
# - strict single-stream HGNetv2 with explicit MS band-separated stem
# - use band-3 as the fixed anchor at stem/C2
defaults:
  - /data/oil_msi_20260202_3cls
  - /model/rtmsfdetr/rtv4_hgnetv2_m
  - /model/smsfdetr/modules/fixed_band_cmda_b3
  - /runtime/default
  - /train/rtmsfdetr_default
  - /task/smsfdetr/base
  - _self_

model:
  model_alias: smsfdetr_rtv4_hgnetv2_m_oil_msi20260202_fixed_band_cmda_b3
  disable_distill: true
  dual_stream_backbone: false

data:
  ms_normalize_mode: per_channel_minmax

train:
  model_alias: smsfdetr_rtv4_hgnetv2_m_det_oil_msi20260202_fixed_band_cmda_b3
  batch_size: 12
  epochs: 100
  num_classes: 3
  lr: 0.0004
  weight_decay: 0.0001
  optimizer_param_groups:
    - params: '^(?=.*backbone\.ms_band_sep_stem)(?!.*(?:norm|bn)).*$'
      lr: 0.0005
    - params: '^(?=.*backbone)(?!.*backbone\.ms_band_sep_stem)(?!.*(?:norm|bn)).*$'
      lr: 0.0002
    - params: '^(?=.*(?:norm|bn)).*$'
      weight_decay: 0.0
  flat_epoch: 49
  no_aug_epoch: 12
