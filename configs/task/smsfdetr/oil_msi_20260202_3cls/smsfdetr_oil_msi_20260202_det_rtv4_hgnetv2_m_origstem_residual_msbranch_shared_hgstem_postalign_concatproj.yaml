# @package _global_

# MSI-only ablation:
# - keep the original HGNetv2 stem as the main path
# - add an explicit per-band residual MS branch
# - align the residual branch to the main stem feature
# - fuse via concat + zero-init 1x1 projection + residual add
defaults:
  - /data/oil_msi_20260202_3cls
  - /model/rtmsfdetr/rtv4_hgnetv2_m
  - /model/smsfdetr/modules/origstem_residual_msbranch_shared_hgstem_postalign_concatproj
  - /runtime/default
  - /train/rtmsfdetr_default
  - /task/smsfdetr/base
  - _self_

model:
  model_alias: smsfdetr_rtv4_hgnetv2_m_oil_msi20260202_origstem_residual_msbranch_shared_hgstem_postalign_concatproj
  disable_distill: true
  dual_stream_backbone: false

data:
  ms_normalize_mode: per_channel_minmax

train:
  model_alias: smsfdetr_rtv4_hgnetv2_m_det_oil_msi20260202_origstem_residual_msbranch_shared_hgstem_postalign_concatproj
  batch_size: 24
  epochs: 100
  num_classes: 3
  lr: 0.0004
  weight_decay: 0.0001
  optimizer_param_groups:
    - params: '^(?=.*backbone\.ms_residual_)(?!.*(?:norm|bn)).*$'
      lr: 0.0005
    - params: '^(?=.*backbone)(?!.*backbone\.ms_residual_)(?!.*(?:norm|bn)).*$'
      lr: 0.0002
    - params: '^(?=.*(?:norm|bn)).*$'
      weight_decay: 0.0
  flat_epoch: 49
  no_aug_epoch: 12
