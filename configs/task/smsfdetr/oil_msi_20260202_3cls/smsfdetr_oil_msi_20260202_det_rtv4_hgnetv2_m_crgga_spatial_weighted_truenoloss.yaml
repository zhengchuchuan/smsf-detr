# @package _global_

# MSI-only ablation after fixing zero-valued align-loss config parsing:
# - keep the explicit MS band-separated stem
# - keep spatial-weighted CRGGA warping
# - disable all auxiliary alignment losses for a true "detection-only warp" run
defaults:
  - /data/oil_msi_20260202_3cls
  - /model/rtmsfdetr/rtv4_hgnetv2_m
  - /model/smsfdetr/modules/crgga_spatial_weighted_noloss
  - /runtime/default
  - /train/rtmsfdetr_default
  - /task/smsfdetr/base
  - _self_

model:
  model_alias: smsfdetr_rtv4_hgnetv2_m_oil_msi20260202_crgga_spatial_weighted_truenoloss
  disable_distill: true
  dual_stream_backbone: false

data:
  ms_normalize_mode: per_channel_minmax

train:
  model_alias: smsfdetr_rtv4_hgnetv2_m_det_oil_msi20260202_crgga_spatial_weighted_truenoloss
  batch_size: 24
  epochs: 100
  num_classes: 3
  lr: 0.0004
  weight_decay: 0.0001
  optimizer_param_groups:
    - params: '^(?=.*backbone\.ms_band_sep_stem)(?!.*(?:norm|bn)).*$'
      lr: 0.0005
    - params: '^(?=.*backbone)(?!.*backbone\.ms_band_sep_stem)(?!.*(?:norm|bn)).*$'
      lr: 0.0002
    - params: '^(?=.*(?:norm|bn)).*$'
      weight_decay: 0.0
  flat_epoch: 49
  no_aug_epoch: 12
