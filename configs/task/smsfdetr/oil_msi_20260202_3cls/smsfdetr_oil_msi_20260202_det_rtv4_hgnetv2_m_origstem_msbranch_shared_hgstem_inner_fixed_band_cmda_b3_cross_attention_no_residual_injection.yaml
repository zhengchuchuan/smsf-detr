# @package _global_

# MSI-only ablation:
# - keep the original single-stream HGNetv2 stem as the main path
# - add a shallow explicit per-band MS branch with inner fixed-band CMDA
# - replace deformable StemCF with standard cross-attention for main-branch refinement
# - remove the final residual injection after the interaction step
defaults:
  - /data/oil_msi_20260202_3cls
  - /model/rtmsfdetr/rtv4_hgnetv2_m
  - /model/smsfdetr/modules/origstem_msbranch_shared_hgstem_inner_fixed_band_cmda_b3_cross_attention_no_residual_injection
  - /runtime/default
  - /train/rtmsfdetr_default
  - /task/smsfdetr/base
  - _self_

model:
  model_alias: smsfdetr_rtv4_hgnetv2_m_oil_msi20260202_origstem_msbranch_shared_hgstem_inner_fixed_band_cmda_b3_cross_attention_no_residual_injection
  disable_distill: true
  dual_stream_backbone: false

data:
  ms_normalize_mode: per_channel_minmax

train:
  model_alias: smsfdetr_rtv4_hgnetv2_m_det_oil_msi20260202_origstem_msbranch_shared_hgstem_inner_fixed_band_cmda_b3_cross_attention_no_residual_injection
  batch_size: 8
  epochs: 100
  num_classes: 3
  lr: 0.0004
  weight_decay: 0.0001
  optimizer_param_groups:
    - params: '^(?=.*backbone\.(?:ms_residual_stem_branch|ms_residual_stem_interactive))(?!.*(?:norm|bn)).*$'
      lr: 0.0005
    - params: '^(?=.*backbone)(?!.*backbone\.(?:ms_residual_stem_branch|ms_residual_stem_interactive))(?!.*(?:norm|bn)).*$'
      lr: 0.0002
    - params: '^(?=.*(?:norm|bn)).*$'
      weight_decay: 0.0
  flat_epoch: 49
  no_aug_epoch: 12
