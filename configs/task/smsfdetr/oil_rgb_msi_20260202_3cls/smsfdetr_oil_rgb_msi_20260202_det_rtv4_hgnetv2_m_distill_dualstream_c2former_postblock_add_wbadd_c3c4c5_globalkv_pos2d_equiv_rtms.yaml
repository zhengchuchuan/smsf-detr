# @package _global_

# 双流等价基线（SMSFDETR）：
# - 数据集: oil_rgb_msi_20260202_3cls
# - 先保持与 RTMSFDETR 双流配置等价，便于后续再逐步集成新模块
defaults:
  - /data/oil_rgb_msi_20260202_3cls
  - /model/smsfdetr/rtv4_hgnetv2_m_distill
  - /runtime/default
  - /train/rtmsfdetr_default
  - /task/smsfdetr/base
  - _self_

model:
  model_alias: rtv4_hgnetv2_m_distill_dualstream_c2former_postblock_add_wbadd_c3c4c5_globalkv_pos2d_equiv_rtms
  dual_stream_backbone: true
  backbone_output_merge: add
  backbone_fusion:
    type: c2former
    # 在每个 stage 的 blocks 之后做融合（stage_end fusion）
    position: post_block
    d_model: 128
    nhead: 8
    fuse_stage_idx: [c3, c4, c5]
    groups: 4
    cca_stride: 3
    offset_range_factor: 2
    no_offset: false
    attn_drop: 0.0
    proj_drop: 0.0
    offset_on: ms
    # append pooled global tokens to DSA K/V + add 2D sincos positional encoding
    global_kv: true
    global_vert_anchors: 8
    global_horz_anchors: 8
    c2former_use_pos_encoding: true
    c2former_pos_temperature: 10000.0

  # 保持等价基线：先关闭 ms band separated stem + group align
  backbone_ms_band_sep:
    enabled: false
    embed_channels: 16
    embed_use_bn: true
    align:
      enabled: true
      ref_mode: spatial_weighted
      ref_detach: true
      num_iters: 1
      num_keypoints: 9
      offset_enabled: true
      offset_scale: 3.0
      attention_norm: softmax
      padding_mode: border
      align_corners: true
      loss_type: infonce
      loss_downsample: 0.5
      nce_patch_size: 5
      nce_num_patches: 64
      nce_tau: 0.2
      loss_weight: 0.02
      loss_offset_weight: 0.01
      loss_attn_entropy_weight: 0.001

train:
  model_alias: rtv4_hgnetv2_m_distill_det_dualstream_c2former_postblock_add_wbadd_c3c4c5_globalkv_pos2d_equiv_rtms
  batch_size: 8
  epochs: 100
  num_classes: 3
  # Align to RT-DETRv4-M recipe.
  lr: 0.0005
  weight_decay: 0.0001
  optimizer_param_groups:
    - params: '^(?=.*backbone)(?!.*(?:norm|bn)).*$'
      lr: 0.00004
    - params: '^(?=.*(?:norm|bn)).*$'
      weight_decay: 0.0
  flat_epoch: 49
  no_aug_epoch: 12
