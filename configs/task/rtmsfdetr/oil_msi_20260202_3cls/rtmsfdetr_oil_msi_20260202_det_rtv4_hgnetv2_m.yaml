# @package _global_

defaults:
  - /data/oil_msi_20260202_3cls
  - /model/rtmsfdetr/rtv4_hgnetv2_m
  - /runtime/default
  - /train/rtmsfdetr_default
  - /task/rtmsfdetr/base
  - _self_

model:
  # Make the output directory/model variant explicit for MSI-only runs.
  model_alias: rtv4_hgnetv2_m_msi7
  # Single-stream: 7-channel MSI tensor is fed directly into HGNetv2.
  dual_stream_backbone: false

train:
  batch_size: 24
  epochs: 100
  num_classes: 3
  # Align to RT-DETRv4-M recipe.
  lr: 0.0005
  weight_decay: 0.0001
  optimizer_param_groups:
    - params: '^(?=.*backbone)(?!.*(?:norm|bn)).*$'
      lr: 0.00004
    - params: '^(?=.*(?:norm|bn)).*$'
      weight_decay: 0.0
  flat_epoch: 49
  no_aug_epoch: 12

