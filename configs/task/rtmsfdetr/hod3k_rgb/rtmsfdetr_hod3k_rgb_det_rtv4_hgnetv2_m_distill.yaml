# @package _global_

defaults:
  - /data/HOD3K_rgb
  - /model/rtmsfdetr/rtv4_hgnetv2_m_distill
  - /runtime/default
  - /train/rtmsfdetr_default
  - /task/rtmsfdetr/base
  - _self_

train:
  batch_size: 24
  # img_size: 512
  epochs: 50
  num_classes: 3
  # Align to RT-DETRv4-M recipe.
  lr: 0.0005
  weight_decay: 0.0001
  optimizer_param_groups:
    - params: '^(?=.*backbone)(?!.*(?:norm|bn)).*$'
      lr: 0.00004
    - params: '^(?=.*(?:norm|bn)).*$'
      weight_decay: 0.0
  flat_epoch: 49
  no_aug_epoch: 12
