# @package _global_

defaults:
  - /data/oil_rgb_msi_20260115
  - /model/rtmsfdetr/rtv4_hgnetv2_m_distill
  - /runtime/default
  - /train/rtmsfdetr_default
  - /task/rtmsfdetr/base
  - _self_

model:
  model_alias: rtv4_hgnetv2_m_distill_det_dualstream_c2former_add_wbadd_c3c4c5_msgroup_c2_affine_trans_infonce_wt0p02_gc8
  dual_stream_backbone: true
  backbone_output_merge: add
  backbone_fusion:
    type: c2former
    d_model: 128
    nhead: 8
    fuse_stage_idx: [c3, c4, c5]
    groups: 4
    cca_stride: 3
    offset_range_factor: 2
    no_offset: false
    attn_drop: 0.0
    proj_drop: 0.0
    offset_on: ms
  # MS 组内对齐（7 波段无固定参考），在 C2 特征上做 projected groupwise “全局平移”对齐。
  backbone_group_align:
    enabled: true
    stage_idx: [c2]
    position: pre_block
    num_groups: 7
    group_channels: 8
    ref_mode: spatial_weighted
    num_iters: 1
    num_keypoints: 1
    offset_enabled: false
    affine_enabled: true
    affine_type: translation
    affine_scale: 0.01
    loss_type: infonce
    loss_downsample: 0.5
    nce_patch_size: 5
    nce_num_patches: 64
    nce_tau: 0.2
    loss_weight: 0.02
    input_enabled: false

train:
  batch_size: 12
  epochs: 120
  num_classes: 4
  lr: 0.0005
  weight_decay: 0.000125
  optimizer_param_groups:
    - params: '^(?=.*backbone)(?!.*norm|bn).*$'
      lr: 0.000025
    - params: '^(?=.*(?:encoder|decoder))(?=.*(?:norm|bn)).*$'
      weight_decay: 0.0
  flat_epoch: 29
  no_aug_epoch: 8

