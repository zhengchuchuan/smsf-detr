# @package _global_

defaults:
  - /data/oil_rgb_20260101_all_data
  - /model/rtmsfdetr/rtv4_hgnetv2_x_distill
  - /runtime/default
  - /train/rtmsfdetr_default
  - /task/rtmsfdetr/base
  - _self_

train:
  batch_size: 4
  epochs: 120
  num_classes: 4
  # 对齐 RTv4-X 原始 recipe（开启 distill 时请确保本地 DINOv3 repo + 权重已配置）
  lr: 0.00005
  weight_decay: 0.000125
  optimizer_param_groups:
    - params: '^(?=.*backbone)(?!.*norm|bn).*$'
      lr: 0.000005
    - params: '^(?=.*(?:encoder|decoder))(?=.*(?:norm|bn)).*$'
      weight_decay: 0.0
  # RTv4-X 原始配置（flat-cosine）
  flat_epoch: 29
  no_aug_epoch: 8
