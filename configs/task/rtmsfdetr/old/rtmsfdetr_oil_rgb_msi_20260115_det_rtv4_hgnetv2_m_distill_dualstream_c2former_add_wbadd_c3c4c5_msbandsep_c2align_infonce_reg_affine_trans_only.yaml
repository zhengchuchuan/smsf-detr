# @package _global_
# based on: rtmsfdetr_oil_rgb_msi_20260115_det_rtv4_hgnetv2_m_distill_dualstream_c2former_add_wbadd_c3c4c5_msbandsep_c2align_infonce_reg.yaml
# exp: replace deformable offsets with translation-only affine alignment (more rigid, less distortion).

defaults:
  - /data/oil_rgb_msi_20260115
  - /model/rtmsfdetr/rtv4_hgnetv2_m_distill
  - /runtime/default
  - /train/rtmsfdetr_default
  - /task/rtmsfdetr/base
  - _self_

model:
  model_alias: rtv4_hgnetv2_m_distill_det_dualstream_c2former_add_wbadd_c3c4c5_msbandsep_c2align_infonce_reg_affine_trans_only
  dual_stream_backbone: true
  backbone_output_merge: add
  backbone_fusion:
    type: c2former
    d_model: 128
    nhead: 8
    fuse_stage_idx: [c3, c4, c5]
    groups: 4
    cca_stride: 3
    offset_range_factor: 2
    no_offset: false
    attn_drop: 0.0
    proj_drop: 0.0
    offset_on: ms

  backbone_ms_band_sep:
    enabled: true
    embed_channels: 16
    embed_use_bn: true
    align:
      enabled: true
      ref_mode: spatial_weighted
      ref_detach: true
      num_iters: 1
      # Offsets are disabled -> keep K small for efficiency.
      num_keypoints: 1
      offset_enabled: false
      offset_scale: 0.0
      attention_norm: softmax
      padding_mode: border
      align_corners: true
      loss_type: infonce
      loss_downsample: 0.5
      nce_patch_size: 5
      nce_num_patches: 64
      nce_tau: 0.2
      affine_enabled: true
      affine_type: translation
      affine_scale: 0.1
      affine_init_identity: true
      loss_weight: 0.02
      loss_offset_weight: 0.0
      loss_attn_entropy_weight: 0.0

train:
  batch_size: 8
  epochs: 120
  num_classes: 4
  lr: 0.0005
  weight_decay: 0.000125
  optimizer_param_groups:
    - params: '^(?=.*backbone)(?!.*norm|bn).*$'
      lr: 0.000025
    - params: '^(?=.*(?:encoder|decoder))(?=.*(?:norm|bn)).*$'
      weight_decay: 0.0
  flat_epoch: 29
  no_aug_epoch: 8

