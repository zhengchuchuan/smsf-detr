# @package _global_

defaults:
  - /data/oil_rgb_msi_20260110
  - /model/rtmsfdetr/rtv4_hgnetv2_l_distill
  - /runtime/default
  - /train/rtmsfdetr_default
  - /task/rtmsfdetr/base
  - _self_

model:
  model_alias: rtv4_hgnetv2_l_dualstream_cft_add_wbadd_outc3concat1x1
  dual_stream_backbone: true
  # Stage-wise output merge (dual-stream -> FPN):
  # - C3: concat+1x1 (reduce misalignment noise on early/high-res features)
  # - C4/C5: add
  backbone_output_merge:
    default: add
    c3: concat1x1
  backbone_fusion:
    type: cft
    d_model: 128
    nhead: 8
    n_layer: 8
    block_exp: 4
    vert_anchors: 8
    horz_anchors: 8
    dropout: 0.0
    alpha_init: 0.0
    # CFT write-back merge inside GPTFusion2D.
    writeback_merge: add

train:
  batch_size: 16
  epochs: 120
  num_classes: 4
  lr: 0.0005
  weight_decay: 0.000125
  optimizer_param_groups:
    - params: '^(?=.*backbone)(?!.*norm|bn).*$'
      lr: 0.000025
    - params: '^(?=.*(?:encoder|decoder))(?=.*(?:norm|bn)).*$'
      weight_decay: 0.0
  flat_epoch: 29
  no_aug_epoch: 8

