# @package _global_

defaults:
  - /data/oil_rgb_msi_20260110
  - /model/rtmsfdetr/rtv4_hgnetv2_m_distill
  - /runtime/default
  - /train/rtmsfdetr_default
  - /task/rtmsfdetr/base
  - _self_

model:
  model_alias: rtv4_hgnetv2_m_dualstream_cft_add_wbadd_msattn_eca_c5_prefuse
  dual_stream_backbone: true
  backbone_output_merge: add

  # MS branch ECA only on C5 (stage idx=3), applied before fusion (pre_fuse).
  ms_channel_attn: eca
  ms_channel_attn_position: pre_fuse
  ms_channel_attn_stage_idx: [3]  # 3 -> C5
  ms_eca_kernel_size: null

  backbone_fusion:
    type: cft
    d_model: 128
    nhead: 8
    n_layer: 8
    block_exp: 4
    vert_anchors: 8
    horz_anchors: 8
    dropout: 0.0
    alpha_init: 0.0
    writeback_merge: add

train:
  batch_size: 16
  epochs: 120
  num_classes: 4
  lr: 0.0005
  weight_decay: 0.000125
  optimizer_param_groups:
    - params: '^(?=.*backbone)(?!.*norm|bn).*$'
      lr: 0.000025
    - params: '^(?=.*(?:encoder|decoder))(?=.*(?:norm|bn)).*$'
      weight_decay: 0.0
  flat_epoch: 29
  no_aug_epoch: 8

