# @package _global_

defaults:
  - /data/oil_rgb_msi_20260113
  - /model/rtmsfdetr/rtv4_hgnetv2_m_distill
  - /runtime/default
  - /train/rtmsfdetr_default
  - /task/rtmsfdetr/base
  - _self_

model:
  model_alias: rtv4_hgnetv2_m_dualstream_nostage_postmrtcorr
  dual_stream_backbone: true
  # Fallback output merge (only used when backbone_post_fusion.type=none).
  backbone_output_merge: add

  # Disable in-backbone stage fusion (keep RGB/MS streams separate in backbone stages).
  backbone_fusion:
    type: none

  # MRT-style fusion on (C3/C4/C5) from both streams before entering HybridEncoder.
  backbone_post_fusion:
    type: mrt
    d_model: 128
    num_stages: 2
    fused_channels: 64
    norm: gn
    use_pos_encoding: true

train:
  batch_size: 16
  epochs: 120
  num_classes: 4
  lr: 0.0005
  weight_decay: 0.000125
  optimizer_param_groups:
    - params: '^(?=.*backbone)(?!.*norm|bn).*$'
      lr: 0.000025
    - params: '^(?=.*(?:encoder|decoder))(?=.*(?:norm|bn)).*$'
      weight_decay: 0.0
  flat_epoch: 29
  no_aug_epoch: 8

