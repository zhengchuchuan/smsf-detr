# @package _global_
# based on: rtmsfdetr_oil_rgb_msi_20260115_det_rtv4_hgnetv2_m_distill_dualstream_c2former_add_wbadd_c3c4c5_alignmsin_c2_infonce_p5n64_ch3_offset(900-785).yaml
# exp: enable MS band-separated stem (no cross-band fusion before stride=4) + true 7-band groupwise C2 alignment (InfoNCE),
#      and disable the original alignmsin_c2 (to avoid double alignment).

defaults:
  - /data/oil_rgb_msi_20260115
  - /model/rtmsfdetr/rtv4_hgnetv2_m_distill
  - /runtime/default
  - /train/rtmsfdetr_default
  - /task/rtmsfdetr/base
  - _self_

model:
  model_alias: rtv4_hgnetv2_m_distill_det_dualstream_c2former_add_wbadd_c3c4c5_msbandsep_c2align_infonce_reg_replace_alignmsin_c2
  dual_stream_backbone: true
  backbone_output_merge: add
  backbone_fusion:
    type: c2former
    d_model: 128
    nhead: 8
    fuse_stage_idx: [c3, c4, c5]
    groups: 4
    cca_stride: 3
    offset_range_factor: 2
    no_offset: false
    attn_drop: 0.0
    proj_drop: 0.0
    offset_on: ms

  # New: MS stem without cross-band fusion + reference-band-free alignment at C2 (stride=4).
  backbone_ms_band_sep:
    enabled: true
    embed_channels: 16
    embed_use_bn: true
    align:
      enabled: true
      ref_mode: spatial_weighted
      ref_detach: true
      num_iters: 1
      num_keypoints: 9
      offset_enabled: true
      offset_scale: 3.0
      attention_norm: softmax
      padding_mode: border
      align_corners: true
      loss_type: infonce
      loss_downsample: 0.5
      nce_patch_size: 5
      nce_num_patches: 64
      nce_tau: 0.2
      loss_weight: 0.05
      loss_offset_weight: 0.01
      loss_attn_entropy_weight: 0.001

  # Keep the original block here but disable it (we use backbone_ms_band_sep instead).
  backbone_align:
    enabled: false

train:
  batch_size: 8
  epochs: 120
  num_classes: 4
  lr: 0.0005
  weight_decay: 0.000125
  optimizer_param_groups:
    - params: '^(?=.*backbone)(?!.*norm|bn).*$'
      lr: 0.000025
    - params: '^(?=.*(?:encoder|decoder))(?=.*(?:norm|bn)).*$'
      weight_decay: 0.0
  flat_epoch: 29
  no_aug_epoch: 8
