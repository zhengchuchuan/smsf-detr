# @package _global_

model:
  model_name: rtmsfdetr
  model_alias: rtv4_hgnetv2_x
  rtdetrv4_config: engines/models/rtmsfdetr/rtdetrv4/configs/rtv4/rtv4_hgnetv2_x_coco.yml
  # RT-DETRv4 官方预训练（若你有本地权重文件可放到该路径）
  pretrain_weights: weights/rtdetr/RTv4-X-hgnet.pth

  # 先跑通 RGB-only baseline：关闭蒸馏/teacher
  disable_distill: true

  # HGNetv2 预训练默认关闭（避免网络依赖）；如有本地权重可手动打开并指定目录
  hgnet_pretrained: false
  hgnet_local_model_dir: null

  # 输入反归一化（更贴近 RT-DETRv4 原始实现）
  input_denormalize: true
  clamp_after_denormalize: true

  # Instance segmentation (off by default)
  segmentation_head: false
  mask_feature_level: 0
  mask_downsample_ratio: 8
  mask_aux_loss: false
