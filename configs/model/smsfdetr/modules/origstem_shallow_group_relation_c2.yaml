# @package _global_

model:
  # Keep the original HGNetv2 stem, then build shallow group relations on C2/stage1 input
  # via ProjectedCRGGA. This operates on shallow stem features (B,C,H,W), not raw MSI bands.
  backbone_ms_band_sep:
    enabled: false
  backbone_group_align:
    enabled: true
    input_enabled: false
    position: pre_block
    stage_idx: c2
    num_groups: 7
    group_channels: 8
    ref_mode: spatial_weighted
    ref_detach: true
    num_iters: 1
    num_keypoints: 9
    offset_enabled: true
    offset_scale: 3.0
    attention_norm: softmax
    padding_mode: border
    align_corners: true
    loss_type: infonce
    loss_downsample: 0.5
    nce_patch_size: 5
    nce_num_patches: 64
    nce_tau: 0.2
    loss_weight: 0.02
    loss_offset_weight: 0.01
    loss_attn_entropy_weight: 0.001
