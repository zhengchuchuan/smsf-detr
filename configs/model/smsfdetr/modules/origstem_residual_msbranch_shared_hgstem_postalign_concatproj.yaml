# @package _global_

model:
  backbone_ms_band_sep:
    enabled: false
  # Keep the original stem as the main path.
  # Build an explicit-band residual MS branch, align that branch to the main stem feature,
  # then fuse via concat + zero-init 1x1 projection + residual add.
  backbone_ms_residual_stem:
    enabled: true
    extractor_type: shared_hgstem
    stem_norm_type: gn
    merge_activation: identity
    fusion_mode: concat_proj
    scale_init: 1.0
    scale_per_channel: true
    align:
      enabled: false
    post_align:
      enabled: true
      ref_detach: true
      num_keypoints: 9
      offset_enabled: true
      offset_scale: 3.0
      attention_norm: softmax
      padding_mode: border
      align_corners: true
      loss_type: infonce
      loss_downsample: 0.5
      nce_patch_size: 5
      nce_num_patches: 64
      nce_tau: 0.2
      loss_weight: 0.02
      loss_offset_weight: 0.01
      loss_attn_entropy_weight: 0.001
