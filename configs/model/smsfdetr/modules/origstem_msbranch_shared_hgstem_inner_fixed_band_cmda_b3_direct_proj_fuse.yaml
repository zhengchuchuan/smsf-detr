# @package _global_

model:
  backbone_ms_band_sep:
    enabled: false
  # Keep the original HGNetv2 stem as the main path.
  # Build an explicit-band MS branch with inner fixed-band CMDA, then fuse
  # the original stem feature and the MS branch feature directly via concat+1x1 proj.
  # Note: the config key remains `backbone_ms_residual_stem` for compatibility,
  # but this variant does not use residual add or StemCF interaction.
  backbone_ms_residual_stem:
    enabled: true
    extractor_type: shared_hgstem
    stem_norm_type: gn
    merge_activation: identity
    fusion_mode: direct_proj
    align:
      enabled: true
      type: fixed_band_cmda
      anchor_band_index: 3
      anchor_detach: true
      num_iters: 1
      num_keypoints: 9
      offset_enabled: true
      offset_scale: 3.0
      attention_norm: softmax
      padding_mode: border
      align_corners: true
      loss_type: infonce
      loss_downsample: 0.5
      nce_patch_size: 5
      nce_num_patches: 64
      nce_tau: 0.2
      loss_weight: 0.02
      loss_offset_weight: 0.01
      loss_attn_entropy_weight: 0.001
    stem_interactive:
      enabled: false
    post_align:
      enabled: false
