# @package _global_

model:
  # Keep the original HGNetv2 stem as the main path.
  # Add a shallow explicit-band residual MS branch with inner fixed-band CMDA,
  # then apply a weak projected group-relation refinement on C2/stage1 input.
  # This combines explicit band-aware correction and implicit shallow relation modeling,
  # while keeping both branches conservative to reduce over-correction risk.
  backbone_ms_band_sep:
    enabled: false

  backbone_ms_residual_stem:
    enabled: true
    extractor_type: shared_hgstem
    stem_norm_type: gn
    merge_activation: identity
    fusion_mode: add
    scale_init: 0.02
    scale_per_channel: true
    align:
      enabled: true
      type: fixed_band_cmda
      anchor_band_index: 3
      anchor_detach: true
      num_iters: 1
      num_keypoints: 5
      offset_enabled: true
      offset_scale: 2.0
      attention_norm: softmax
      padding_mode: border
      align_corners: true
      loss_type: infonce
      loss_downsample: 0.5
      nce_patch_size: 5
      nce_num_patches: 64
      nce_tau: 0.2
      loss_weight: 0.01
      loss_offset_weight: 0.005
      loss_attn_entropy_weight: 0.0005
    post_align:
      enabled: false

  backbone_group_align:
    enabled: true
    input_enabled: false
    position: pre_block
    stage_idx: c2
    num_groups: 7
    group_channels: 8
    ref_mode: spatial_weighted
    ref_detach: true
    num_iters: 1
    num_keypoints: 5
    offset_enabled: true
    offset_scale: 2.0
    attention_norm: softmax
    padding_mode: border
    align_corners: true
    loss_type: infonce
    loss_downsample: 0.5
    nce_patch_size: 5
    nce_num_patches: 64
    nce_tau: 0.2
    loss_weight: 0.01
    loss_offset_weight: 0.005
    loss_attn_entropy_weight: 0.0005
