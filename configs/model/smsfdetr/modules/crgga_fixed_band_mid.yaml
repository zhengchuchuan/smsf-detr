# @package _global_

model:
  # CRGGA: 使用固定band作为参考图（默认中间band）
  backbone_ms_band_sep:
    enabled: true
    embed_channels: 16
    embed_use_bn: true
    align:
      enabled: true
      ref_mode: fixed_band
      # None/auto/middle 时自动使用中间band (N//2)
      # 也可以手动设置具体索引，例如 3
      ref_band_index: auto
      ref_detach: true
      num_iters: 1
      num_keypoints: 9
      offset_enabled: true
      offset_scale: 3.0
      attention_norm: softmax
      padding_mode: border
      align_corners: true
      loss_type: infonce
      loss_downsample: 0.5
      nce_patch_size: 5
      nce_num_patches: 64
      nce_tau: 0.2
      loss_weight: 0.02
      loss_offset_weight: 0.01
      loss_attn_entropy_weight: 0.001
