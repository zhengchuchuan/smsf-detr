# @package _global_

model:
  # 保留原始 HGNetv2 stem，只在 stem 之前对原始 7-band MSI 做 fixed-band CRGGA。
  # 这样 reference 仍然是真实波段，而不是 stem 后再构造的投影 group。
  backbone_group_align:
    enabled: false
    input_enabled: true
    input_ref_mode: fixed_band
    # 7-band MSI 的中间 band 索引为 3
    input_ref_band_index: 3
    input_ref_detach: true
    input_num_iters: 1
    input_num_keypoints: 9
    input_offset_enabled: true
    input_offset_scale: 3.0
    input_attention_norm: softmax
    input_padding_mode: border
    input_align_corners: true
    input_loss_type: infonce
    input_loss_downsample: 0.5
    input_nce_patch_size: 5
    input_nce_num_patches: 64
    input_nce_tau: 0.2
    input_loss_weight: 0.0
    input_loss_offset_weight: 0.0
    input_loss_attn_norm_weight: 0.0
    input_loss_attn_entropy_weight: 0.0
