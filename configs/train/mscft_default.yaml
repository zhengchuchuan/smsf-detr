# @package _global_

# 贴近项目通用训练超参，默认跑 300 epochs，可按需覆盖。
train:
  # solid+liquid -> oil
  num_classes: 4
  grad_accum_steps: 1
  amp: true
  # MSCFT 训练默认采用 YOLO 风格超参：
  # - lr: 若为 null，将回落到 hyp.scratch.yaml 的 lr0（默认 0.01）
  # - optimizer: sgd
  optimizer: sgd
  lr: null
  lr_encoder: 0.00015
  batch_size: 8
  momentum: 0.937
  weight_decay: 0.0005
  epochs: 300
  lr_drop: 200
  clip_max_norm: 1.0
  lr_vit_layer_decay: 0.8
  lr_component_decay: 1.0
  dropout: 0.0
  drop_path: 0.0
  aux_loss: true
  sum_group_losses: false
  ia_bce_loss: true
  set_cost_class: 2
  set_cost_bbox: 5
  set_cost_giou: 2
  cls_loss_coef: 1.0
  bbox_loss_coef: 5
  giou_loss_coef: 2
  focal_alpha: 0.25
  dont_save_weights: false
  checkpoint_interval: 10
  # 仅保留 checkpoint.pth（最新）与 checkpoint_best.pth（最优），并清理 checkpoint_*.pth（按 epoch 命名的周期权重）
  keep_only_best_and_last: true
  seed: 42
  resume: ''
  start_epoch: 0
  eval: false
  use_ema: true
  ema_decay: 0.993
  ema_tau: 0
  num_workers: 8
  tensorboard: false
  wandb: false
  # 训练时将每个 epoch 的指标额外写入输出目录的 CSV（默认 metrics.csv）
  save_metrics_csv: true
  metrics_csv_name: metrics.csv
  run_test: true
  lr_scheduler: cosine
  lr_min_factor: 0.2
  anchor_check: true
  prototype_runtime_config: null
  early_stopping: false
  early_stopping_patience: 10
  early_stopping_min_delta: 0.001
  early_stopping_use_ema: false
  # best 权重选择策略：默认按 COCO 指标加权选择（越大越好）
  best_monitor: fitness   # best_metric_weights 非空时会被忽略
  best_mode: max          # auto/min/max；auto 会对 loss 走 min、对其它指标走 max
  best_start_epoch: 0     # 从第 N 个 epoch 开始参与 best 判定（用于跳过前期波动）
  best_eps: 1.0e-9        # 判定“更优”的数值阈值
  best_fallback_to_val_loss: false  # 指标缺失时不回退，避免与加权分数混用
  # fitness = 0.1 * Precision + 0.1 * Recall + 0.5 * mAP@0.5 + 0.3 * mAP@0.5:0.95
  best_metric_weights: {precision: 0.1, recall: 0.1, map50: 0.5, map50_95: 0.3}
  multi_scale: false
  expanded_scales: false
  do_random_resize_via_padding: false
  val_print_freq: 50
  print_freq: 50
  warmup_epochs: 3
  segmentation_head: false
  mask_point_sample_ratio: 16
  mask_ce_loss_coef: 5.0
  mask_dice_loss_coef: 5.0
  # 指标可视化（默认启用新增图表）
  metric_charts:
    annotate_bars: true
    max_annotate_classes: 20
    include_all_in_per_class: true
    # 指标取点方式：f1（YOLO 风格，取最佳 F1 点）/ threshold（固定阈值）
    score_select: f1
    score_threshold: 0.5
    dataset:
      enabled: true
      split: train
      prefix: dataset
      small_thr: 32
      medium_thr: 96
      max_annotate_classes: 60
      annotate: true
    # YOLO 风格标签分布图（labels.jpg / labels_correlogram.jpg）
    yolo_labels:
      enabled: true
      split: train   # train/val/test/all
      save_subdir: metric_charts
      max_points: 20000
      seed: 0
      extra:
        enabled: true
        filename: labels_extra.jpg
        bins: 60
        max_boxes: 200000
      per_class:
        enabled: true
        top_k: 16
        bins: 50
        max_boxes_per_class: 20000
        centers_filename: labels_centers_topk.jpg
        wh_filename: labels_wh_topk.jpg
      cooccurrence:
        enabled: true
        metric: jaccard   # jaccard/count/p(j|i)
        top_k: 30
        annotate: false
        max_annotate_classes: 20
        filename: labels_cooccurrence.jpg
    inference:
      enabled: true
      warmup_batches: 5
      max_batches: 50
      include_postprocess: true
      include_loss: false
      include_flops: true
    samples:
      enabled: true
      num_samples: 8
      score_threshold: 0.3
      max_dets: 50
    segm:
      enabled: true
  criterion:
    losses:
      - name: set_criterion
        weight: 1.0
  # MSCFT YOLO 超参（损失/anchor 配置），如未设置则使用 model.hyp
  hyp: engines/models/mscft/hyp.scratch.yaml
