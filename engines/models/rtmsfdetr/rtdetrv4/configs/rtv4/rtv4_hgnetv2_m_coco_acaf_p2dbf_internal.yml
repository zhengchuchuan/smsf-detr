__include__: [
  './rtv4_hgnetv2_m_coco.yml'
]

output_dir: ./outputs/rtv4_hgnetv2_m_coco_acaf_p2dbf_internal

HGNetv2:
  # Expose P2 for internal detail bridging.
  return_idx: [0, 1, 2, 3]

HybridEncoder:
  in_channels: [96, 384, 768, 1536]
  feat_strides: [4, 8, 16, 32]
  use_encoder_idx: [3]

  # ACAF (top-down path).
  acaf_enabled: True
  acaf_apply_topdown: True
  acaf_apply_bottomup: False
  acaf_reduction: 8
  acaf_num_heads: 8
  acaf_num_points: 2
  acaf_channel_attn: eca
  acaf_channel_attn_reduction: 16
  acaf_offset_scale: 1.0
  acaf_padding_mode: zeros
  acaf_align_corners: True
  acaf_act: silu

  # P2 detail bridge (internal only: encoder drops P2 output before decoder).
  p2_dbf_enabled: True
  p2_dbf_use_internal_only: True
  p2_dbf_from_idx: 0
  p2_dbf_to_idx: 1
  p2_dbf_spd_factor: 2
  p2_dbf_res_scale_init: 0.1
  mkb_enabled: True
  mkb_kernel_size: 7
  mkb_use_global_branch: True
  mkb_expand_ratio: 0.5

DFINETransformer:
  # Keep decoder interface at 3 levels (P3-P5).
  feat_channels: [256, 256, 256]
  feat_strides: [8, 16, 32]
  num_levels: 3
  num_points: [3, 6, 3]
