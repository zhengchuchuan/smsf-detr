__include__: [
  './rtv4_hgnetv2_m_coco.yml'
]

output_dir: ./outputs/rtv4_hgnetv2_m_coco_p2dbf_internal

HGNetv2:
  # Expose P2 for internal detail bridging.
  return_idx: [0, 1, 2, 3]

HybridEncoder:
  in_channels: [96, 384, 768, 1536]
  feat_strides: [4, 8, 16, 32]
  use_encoder_idx: [3]

  # P2 detail bridge (internal only: encoder drops P2 output before decoder).
  p2_dbf_enabled: True
  p2_dbf_use_internal_only: True
  p2_dbf_from_idx: 0
  p2_dbf_to_idx: 1
  p2_dbf_spd_factor: 2
  p2_dbf_res_scale_init: 0.1
  mkb_enabled: True
  mkb_kernel_size: 7
  mkb_use_global_branch: True
  mkb_expand_ratio: 0.5

DFINETransformer:
  # Keep decoder interface at 3 levels (P3-P5).
  feat_channels: [256, 256, 256]
  feat_strides: [8, 16, 32]
  num_levels: 3
  num_points: [3, 6, 3]
