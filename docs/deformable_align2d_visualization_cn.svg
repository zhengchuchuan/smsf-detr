<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1500" viewBox="0 0 2400 1500">
  <defs>
    <style>
      .title { font: 700 34px 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif; fill: #222; }
      .section { font: 700 24px 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif; fill: #222; }
      .label { font: 600 18px 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif; fill: #222; }
      .text { font: 16px 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif; fill: #333; }
      .small { font: 14px 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif; fill: #4b4b4b; }
      .note { font: 600 16px 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif; fill: #5a4630; }
      .arrow { stroke: #333; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .thin { stroke: #555; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #888; stroke-width: 2; stroke-dasharray: 8 6; fill: none; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
  </defs>

  <rect x="16" y="16" width="2368" height="1468" rx="24" fill="#fbfbfb" stroke="#d0d0d0" stroke-width="2"/>
  <text x="1200" y="60" class="title" text-anchor="middle">DeformableAlign2D 模块可视化</text>
  <text x="1200" y="92" class="small" text-anchor="middle">对应代码：engines/models/rtmsfdetr/rtdetrv4/engine/backbone/deform_align.py</text>

  <rect x="50" y="120" width="2300" height="70" rx="12" fill="#fffaf0" stroke="#d2af63" stroke-width="2"/>
  <text x="85" y="148" class="note">当前配置常用路径：</text>
  <text x="290" y="148" class="text">`per_channel_offset=False`，`affine_enabled=False`，`attention_norm=softmax`，在 `FixedBandCMDA` 中通常取 `num_keypoints=9`。</text>
  <text x="85" y="174" class="text">因此，下图重点展示“标准二维对齐路径”：`x_ref, x_src → offset/attention prediction → grid_sample deformable warping → weighted fusion`。</text>

  <!-- Section A -->
  <rect x="40" y="220" width="2320" height="420" rx="20" fill="#f6f1e6" stroke="#c7b28c" stroke-width="2"/>
  <text x="1200" y="256" class="section" text-anchor="middle">A. 偏移与注意力预测阶段</text>

  <rect x="70" y="330" width="210" height="88" rx="14" fill="#fff6cf" stroke="#a89257" stroke-width="2"/>
  <text x="175" y="364" class="label" text-anchor="middle">参考特征 x_ref</text>
  <text x="175" y="392" class="small" text-anchor="middle">(B,C,H,W)</text>

  <rect x="70" y="470" width="210" height="88" rx="14" fill="#dce9f7" stroke="#7b90a7" stroke-width="2"/>
  <text x="175" y="504" class="label" text-anchor="middle">源特征 x_src</text>
  <text x="175" y="532" class="small" text-anchor="middle">(B,C,H,W)</text>

  <rect x="360" y="400" width="230" height="90" rx="14" fill="#fff0d7" stroke="#a56c38" stroke-width="2"/>
  <text x="475" y="434" class="label" text-anchor="middle">按通道拼接</text>
  <text x="475" y="462" class="small" text-anchor="middle">concat[x_ref, x_src]</text>
  <text x="475" y="482" class="small" text-anchor="middle">(B,2C,H,W)</text>

  <rect x="680" y="400" width="220" height="90" rx="14" fill="#ffffff" stroke="#888888" stroke-width="2"/>
  <text x="790" y="430" class="label" text-anchor="middle">offset_predict</text>
  <text x="790" y="456" class="small" text-anchor="middle">Conv3×3 + BN + ReLU</text>
  <text x="790" y="478" class="small" text-anchor="middle">(B,2C,H,W) → (B,C,H,W)</text>

  <rect x="980" y="400" width="180" height="90" rx="14" fill="#ffffff" stroke="#888888" stroke-width="2"/>
  <text x="1070" y="432" class="label" text-anchor="middle">ResidualBlock</text>
  <text x="1070" y="460" class="small" text-anchor="middle">res_block1</text>

  <rect x="1230" y="400" width="190" height="90" rx="14" fill="#ffffff" stroke="#888888" stroke-width="2"/>
  <text x="1325" y="432" class="label" text-anchor="middle">BottleneckBlock</text>
  <text x="1325" y="460" class="small" text-anchor="middle">bottle_block1</text>

  <rect x="1490" y="400" width="180" height="90" rx="14" fill="#ffffff" stroke="#888888" stroke-width="2"/>
  <text x="1580" y="432" class="label" text-anchor="middle">ResidualBlock</text>
  <text x="1580" y="460" class="small" text-anchor="middle">res_block2</text>

  <rect x="1760" y="300" width="230" height="100" rx="14" fill="#cfe7f3" stroke="#64869a" stroke-width="2"/>
  <text x="1875" y="334" class="label" text-anchor="middle">offset_head</text>
  <text x="1875" y="362" class="small" text-anchor="middle">Conv3×3</text>
  <text x="1875" y="386" class="small" text-anchor="middle">(B,C,H,W) → (B,2K,H,W)</text>

  <rect x="1760" y="480" width="230" height="100" rx="14" fill="#cfe7f3" stroke="#64869a" stroke-width="2"/>
  <text x="1875" y="514" class="label" text-anchor="middle">attention_head</text>
  <text x="1875" y="542" class="small" text-anchor="middle">Conv3×3</text>
  <text x="1875" y="566" class="small" text-anchor="middle">(B,C,H,W) → (B,K,H,W)</text>

  <rect x="2070" y="270" width="220" height="120" rx="14" fill="#efeef7" stroke="#8b8a9e" stroke-width="2"/>
  <text x="2180" y="304" class="label" text-anchor="middle">offset reshape + split</text>
  <text x="2180" y="332" class="small" text-anchor="middle">offset_x, offset_y</text>
  <text x="2180" y="356" class="small" text-anchor="middle">各自形状：</text>
  <text x="2180" y="380" class="small" text-anchor="middle">(B,K,H,W)</text>

  <rect x="2070" y="470" width="220" height="110" rx="14" fill="#efeef7" stroke="#8b8a9e" stroke-width="2"/>
  <text x="2180" y="504" class="label" text-anchor="middle">attention normalization</text>
  <text x="2180" y="532" class="small" text-anchor="middle">sigmoid 或 softmax</text>
  <text x="2180" y="556" class="small" text-anchor="middle">当前配置常用：</text>
  <text x="2180" y="578" class="small" text-anchor="middle">softmax → (B,K,H,W)</text>

  <!-- Arrows A -->
  <path class="arrow" d="M280 374 H330 V430 H360"/>
  <path class="arrow" d="M280 514 H330 V460 H360"/>
  <path class="arrow" d="M590 445 H680"/>
  <path class="arrow" d="M900 445 H980"/>
  <path class="arrow" d="M1160 445 H1230"/>
  <path class="arrow" d="M1420 445 H1490"/>
  <path class="arrow" d="M1670 430 H1760"/>
  <path class="arrow" d="M1670 460 H1720 V530 H1760"/>
  <path class="arrow" d="M1990 350 H2070"/>
  <path class="arrow" d="M1990 530 H2070"/>

  <!-- Section B -->
  <rect x="40" y="680" width="2320" height="520" rx="20" fill="#eef6fb" stroke="#88aeca" stroke-width="2"/>
  <text x="1200" y="716" class="section" text-anchor="middle">B. 可变形采样与加权聚合阶段</text>

  <rect x="70" y="790" width="240" height="92" rx="14" fill="#fff6cf" stroke="#a89257" stroke-width="2"/>
  <text x="190" y="824" class="label" text-anchor="middle">基础网格 base_grid</text>
  <text x="190" y="852" class="small" text-anchor="middle">由 `_create_base_grid(h,w)` 生成</text>
  <text x="190" y="874" class="small" text-anchor="middle">(1,H,W,2) → broadcast 到 (B,H,W,2)</text>

  <rect x="70" y="930" width="240" height="86" rx="14" fill="#fffaf0" stroke="#d2af63" stroke-width="2"/>
  <text x="190" y="964" class="note" text-anchor="middle">可选分支</text>
  <text x="190" y="992" class="small" text-anchor="middle">若 `affine_enabled=True`，则先用</text>
  <text x="190" y="1012" class="small" text-anchor="middle">`affine_grid` 替换 base_grid</text>

  <rect x="400" y="760" width="240" height="120" rx="14" fill="#efeef7" stroke="#8b8a9e" stroke-width="2"/>
  <text x="520" y="792" class="label" text-anchor="middle">offset 归一化</text>
  <text x="520" y="820" class="small" text-anchor="middle">offset_x / ((W-1)/2)</text>
  <text x="520" y="844" class="small" text-anchor="middle">offset_y / ((H-1)/2)</text>
  <text x="520" y="868" class="small" text-anchor="middle">保持与 grid_sample 的 [-1,1]</text>

  <rect x="400" y="930" width="240" height="90" rx="14" fill="#efeef7" stroke="#8b8a9e" stroke-width="2"/>
  <text x="520" y="964" class="label" text-anchor="middle">来自预测阶段</text>
  <text x="520" y="992" class="small" text-anchor="middle">offset_x, offset_y, attention</text>

  <rect x="730" y="790" width="290" height="92" rx="14" fill="#fff0d7" stroke="#a56c38" stroke-width="2"/>
  <text x="875" y="824" class="label" text-anchor="middle">构造采样网格 sampling_grid</text>
  <text x="875" y="852" class="small" text-anchor="middle">grid_x = base_grid_x + offset_x</text>
  <text x="875" y="874" class="small" text-anchor="middle">grid_y = base_grid_y + offset_y</text>

  <rect x="730" y="930" width="290" height="90" rx="14" fill="#fff0d7" stroke="#a56c38" stroke-width="2"/>
  <text x="875" y="964" class="label" text-anchor="middle">当前标准形状</text>
  <text x="875" y="992" class="small" text-anchor="middle">sampling_grid: (B,K,H,W,2)</text>

  <rect x="1110" y="790" width="230" height="92" rx="14" fill="#dce9f7" stroke="#7b90a7" stroke-width="2"/>
  <text x="1225" y="824" class="label" text-anchor="middle">扩展源特征</text>
  <text x="1225" y="852" class="small" text-anchor="middle">x_src.unsqueeze(1)</text>
  <text x="1225" y="874" class="small" text-anchor="middle">→ (B,K,C,H,W)</text>

  <rect x="1110" y="930" width="230" height="90" rx="14" fill="#dce9f7" stroke="#7b90a7" stroke-width="2"/>
  <text x="1225" y="964" class="label" text-anchor="middle">reshape for sampling</text>
  <text x="1225" y="992" class="small" text-anchor="middle">(B·K,C,H,W)</text>

  <rect x="1430" y="790" width="250" height="92" rx="14" fill="#f8d64e" stroke="#9e7e20" stroke-width="2"/>
  <text x="1555" y="824" class="label" text-anchor="middle">grid_sample</text>
  <text x="1555" y="852" class="small" text-anchor="middle">双线性采样</text>
  <text x="1555" y="874" class="small" text-anchor="middle">当前常用：padding_mode=border</text>

  <rect x="1430" y="930" width="250" height="90" rx="14" fill="#f8d64e" stroke="#9e7e20" stroke-width="2"/>
  <text x="1555" y="964" class="label" text-anchor="middle">采样结果</text>
  <text x="1555" y="992" class="small" text-anchor="middle">sampled_features: (B,K,C,H,W)</text>

  <rect x="1770" y="790" width="220" height="92" rx="14" fill="#cfe7f3" stroke="#64869a" stroke-width="2"/>
  <text x="1880" y="824" class="label" text-anchor="middle">注意力扩维</text>
  <text x="1880" y="852" class="small" text-anchor="middle">attention.unsqueeze(2)</text>
  <text x="1880" y="874" class="small" text-anchor="middle">→ (B,K,1,H,W)</text>

  <rect x="1770" y="930" width="220" height="90" rx="14" fill="#cfe7f3" stroke="#64869a" stroke-width="2"/>
  <text x="1880" y="964" class="label" text-anchor="middle">加权求和</text>
  <text x="1880" y="992" class="small" text-anchor="middle">(sampled_features * attn).sum(dim=1)</text>

  <rect x="2080" y="840" width="220" height="110" rx="14" fill="#dfe9c8" stroke="#77855c" stroke-width="2"/>
  <text x="2190" y="874" class="label" text-anchor="middle">输出对齐特征</text>
  <text x="2190" y="902" class="small" text-anchor="middle">fused_features</text>
  <text x="2190" y="926" class="small" text-anchor="middle">(B,C,H,W)</text>

  <rect x="400" y="1070" width="1680" height="96" rx="14" fill="#fffaf0" stroke="#d2af63" stroke-width="2"/>
  <text x="440" y="1104" class="note">核心公式：</text>
  <text x="620" y="1104" class="text">sampling_grid_k(h,w) = base_grid(h,w) + Δ_k(h,w)</text>
  <text x="440" y="1136" class="text">x_aligned = Σ_k α_k ⊙ sample(x_src, sampling_grid_k)</text>

  <!-- Optional loss -->
  <rect x="70" y="1240" width="2260" height="200" rx="20" fill="#f7f7f7" stroke="#bbbbbb" stroke-width="2"/>
  <text x="1200" y="1276" class="section" text-anchor="middle">C. 可选训练监督分支（`loss_calculate(...)`）</text>
  <text x="150" y="1320" class="text">输入：`x_ref`、`x_aligned`，以及可选的 `sampled_features`。</text>
  <text x="150" y="1352" class="text">支持的对齐损失类型：`cosine`、`infonce`、`lncc`、`cf_contrast`、`infonce_lncc`。</text>
  <text x="150" y="1384" class="text">在当前项目中，这个监督通常由 `FixedBandCMDA` 在分支内部调用，用于约束源波段对齐到锚点波段后的结果。</text>

  <!-- Arrows B -->
  <path class="arrow" d="M310 836 H400"/>
  <path class="thin" d="M310 976 H350 V820 H400"/>
  <path class="arrow" d="M640 836 H730"/>
  <path class="thin" d="M640 976 H690 V976 H730"/>
  <path class="arrow" d="M1020 836 H1110"/>
  <path class="arrow" d="M1020 976 H1110"/>
  <path class="arrow" d="M1340 836 H1430"/>
  <path class="arrow" d="M1340 976 H1430"/>
  <path class="arrow" d="M1680 836 H1770"/>
  <path class="arrow" d="M1680 976 H1770"/>
  <path class="arrow" d="M1990 885 H2080"/>

</svg>
