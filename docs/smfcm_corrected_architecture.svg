<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="1250" viewBox="0 0 2200 1250">
  <defs>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #2b2b2b; }
      .section { font: 700 22px Arial, sans-serif; fill: #2b2b2b; }
      .label { font: 600 18px Arial, sans-serif; fill: #2b2b2b; }
      .text { font: 16px Arial, sans-serif; fill: #333333; }
      .small { font: 14px Arial, sans-serif; fill: #4b4b4b; }
      .note { font: 600 16px Arial, sans-serif; fill: #5a4630; }
      .border { stroke: #6f6f6f; stroke-width: 2; fill: none; }
      .dash { stroke: #8d8d8d; stroke-width: 2; stroke-dasharray: 8 6; fill: none; }
      .arrow { stroke: #333333; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .thin { stroke: #555555; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
  </defs>

  <rect x="16" y="16" width="2168" height="1218" rx="26" fill="#fbfbfb" stroke="#d0d0d0" stroke-width="2"/>
  <text x="1100" y="55" class="title" text-anchor="middle">Corrected SMFCM Architecture Draft</text>
  <text x="1100" y="84" class="small" text-anchor="middle">Current implementation aligned with OrigStem + Residual MS Branch + FixedBandCMDA + StemCFInteractive2D</text>

  <!-- Section 1 -->
  <rect x="40" y="110" width="2120" height="265" rx="22" fill="#f6f1e6" stroke="#c7b28c" stroke-width="2"/>
